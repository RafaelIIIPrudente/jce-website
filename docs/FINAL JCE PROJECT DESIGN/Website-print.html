<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Electrofields Power System, Inc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="jce-tokens.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-ui); color: var(--jce-ink); background: #1a1f1c; -webkit-font-smoothing: antialiased; }
  button, input, select, textarea { font-family: inherit; }

  /* ---- viewport toolbar (preview chrome, not part of site) ---- */
  .vp-toolbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: 48px; display: flex; align-items: center; gap: 14px; padding: 0 18px; background: rgba(20,26,22,0.9); -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .vp-brand { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 13px; font-weight: 600; }
  .vp-brand img { width: 24px; height: 24px; border-radius: 5px; }
  .vp-seg { display: flex; gap: 3px; margin-left: auto; background: rgba(255,255,255,0.08); padding: 4px; border-radius: 9px; }
  .vp-seg button { border: none; background: transparent; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; padding: 5px 13px; border-radius: 6px; cursor: pointer; }
  .vp-seg button.on { background: var(--jce-green-600); color: #fff; }
  .vp-hint { color: rgba(255,255,255,0.4); font-size: 11px; }

  /* ---- viewport stage ---- */
  .vp-stage { padding: 48px 0 0; min-height: 100vh; display: flex; justify-content: center; }
  .vp-frame { background: var(--jce-bg); flex: none; width: 100%; max-width: 1280px; transition: width var(--dur-base) var(--ease); overflow-x: hidden; }
  .vp-stage[data-vp="390"] { padding: 70px 0 30px; align-items: flex-start; }
  .vp-stage[data-vp="390"] .vp-frame { width: 390px; min-height: 800px; border-radius: 30px; box-shadow: 0 0 0 11px #11150f, 0 30px 80px rgba(0,0,0,0.5); overflow: hidden; }
  .vp-stage[data-vp="768"] { padding: 64px 0 30px; align-items: flex-start; }
  .vp-stage[data-vp="768"] .vp-frame { width: 768px; min-height: 700px; border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,0.4); }
  .vp-stage[data-vp="1280"] .vp-frame { width: 1280px; max-width: 100%; }

  /* the frame establishes container context so the site is truly responsive to ITS width */
  .site-root { container-type: inline-size; }

  /* ================= WEBSITE ================= */
  .site-nav { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 16px; padding: 14px 22px; margin: 12px; border-radius: var(--r-glass); }
  .site-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; flex: none; }
  .site-logo img { width: 34px; height: 34px; border-radius: 8px; }
  .site-logo .sl-name { font-weight: 800; font-size: 15px; letter-spacing: -0.01em; white-space: nowrap; line-height: 1.15; }
  .site-logo .sl-sub { font-size: 9px; color: var(--jce-ink-2); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; line-height: 1.1; }
  .site-links { display: flex; gap: 2px; margin-left: auto; }
  .site-links a { font-size: 13px; font-weight: 500; color: var(--jce-ink-2); padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: all var(--dur-fast) var(--ease); white-space: nowrap; }
  .site-links a:hover { background: var(--jce-green-50); color: var(--jce-green-900); }
  .site-links a.on { color: var(--jce-green-700); font-weight: 600; }
  .site-nav .btn { margin-left: 8px; }
  .nav-burger { display: none; margin-left: auto; width: 40px; height: 40px; border-radius: 9px; border: 1px solid var(--jce-line); background: rgba(255,255,255,0.6); cursor: pointer; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
  .nav-burger span { width: 18px; height: 2px; background: var(--jce-ink); border-radius: 2px; }
  .mobile-menu { display: none; flex-direction: column; padding: 8px 12px 16px; margin: 0 12px 12px; border-radius: var(--r-glass); }
  .mobile-menu a { padding: 11px 12px; font-size: 14px; font-weight: 500; color: var(--jce-ink); border-radius: 8px; cursor: pointer; border-bottom: 1px solid var(--jce-line); }
  .mobile-menu a:last-of-type { border-bottom: none; }
  .mobile-menu .btn { margin-top: 10px; }

  /* hero */
  .web-hero { padding: 56px 22px 48px; text-align: center; overflow: hidden; }
  .hero-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--jce-green-600); font-weight: 600; }
  .hero-h1 { font-size: 38px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.05; margin-top: 14px; }
  .hero-h1 .g { color: var(--jce-green-700); }
  .hero-sub { font-size: 16px; color: var(--jce-ink-2); margin: 18px auto 0; max-width: 56ch; line-height: 1.55; }
  .hero-cta { display: flex; gap: 12px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }
  .hero-cta .btn { padding: 12px 22px; font-size: 15px; }
  .hero-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 44px; max-width: 720px; margin-left: auto; margin-right: auto; }
  .hstat { text-align: center; }
  .hstat-v { font-size: 26px; font-weight: 800; color: var(--jce-green-900); letter-spacing: -0.02em; }
  .hstat-k { font-size: 11px; color: var(--jce-ink-2); margin-top: 4px; line-height: 1.3; }

  .web-section { padding: 48px 22px; max-width: 1180px; margin: 0 auto; }
  .web-section.alt { background: rgba(0,120,23,0.025); max-width: none; }
  .web-section.alt > * { max-width: 1180px; margin-left: auto; margin-right: auto; }
  .sec-head { display: flex; flex-direction: column; gap: 6px; margin-bottom: 28px; position: relative; }
  .sec-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--jce-green-600); font-weight: 600; }
  .sec-h2 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
  .sec-link { background: none; border: none; color: var(--jce-green-700); font-weight: 600; font-size: 14px; cursor: pointer; }
  .sec-head .sec-link { position: absolute; right: 0; bottom: 4px; }

  /* capability grid */
  .cap-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .cap-card { text-align: left; padding: 22px; border: none; cursor: pointer; transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur-fast) var(--ease); }
  .cap-card:hover { transform: translateY(-3px); box-shadow: 0 14px 34px rgba(15,27,20,0.12); }
  .cap-ic { width: 48px; height: 48px; border-radius: 12px; background: var(--jce-green-50); display: grid; place-items: center; margin-bottom: 14px; }
  .cap-name { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .cap-spec { font-size: 12px; color: var(--jce-orange-600); font-weight: 600; margin-top: 4px; }

  /* project cards */
  .proj-rail, .proj-gallery { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .pcard { overflow: hidden; padding: 0; cursor: pointer; transition: transform var(--dur-fast) var(--ease); }
  .pcard:hover { transform: translateY(-3px); }
  .pcard-img { height: 170px; background: linear-gradient(135deg, var(--jce-green-100), var(--jce-orange-100)); position: relative; }
  .pcard-ph { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .pcard-ph span { font-size: 11px; color: var(--jce-ink-2); font-family: var(--font-mono); }
  .pcard-year { position: absolute; top: 10px; right: 10px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.85); padding: 2px 8px; border-radius: var(--r-pill); }
  .pcard-body { padding: 16px; }
  .pcard-name { font-size: 16px; font-weight: 700; }
  .pcard-meta { font-size: 12px; color: var(--jce-ink-2); margin-top: 3px; }
  .pcard-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
  .wtag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 5px; background: var(--jce-green-50); color: var(--jce-green-900); }

  /* trust band */
  .trust-band { display: flex; align-items: center; gap: 24px; padding: 32px; }
  .trust-txt h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .trust-txt p { font-size: 14px; color: var(--jce-ink-2); margin-top: 8px; max-width: 60ch; }
  .trust-band .btn { white-space: nowrap; flex: none; }

  /* CTA */
  .web-cta { padding: 56px 22px; text-align: center; overflow: hidden; }
  .cta-inner h2 { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
  .cta-inner p { font-size: 15px; color: var(--jce-ink-2); margin: 12px auto 24px; max-width: 50ch; }

  /* inner page hero */
  .inner-hero { padding: 48px 22px 40px; overflow: hidden; }
  .ih-inner { max-width: 1180px; margin: 0 auto; }
  .ih-title { font-size: 36px; font-weight: 800; letter-spacing: -0.025em; margin-top: 12px; }
  .ih-sub { font-size: 16px; color: var(--jce-ink-2); margin-top: 12px; max-width: 64ch; line-height: 1.5; }

  /* about */
  .about-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .about-card { padding: 22px; }
  .ac-k { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--jce-green-600); font-weight: 600; }
  .ac-v { font-size: 16px; font-weight: 500; margin-top: 10px; line-height: 1.5; }
  .stat-band { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; padding: 28px; margin-top: 24px; }
  .sb-stat { text-align: center; }
  .sb-v { font-size: 28px; font-weight: 800; color: var(--jce-green-900); letter-spacing: -0.02em; }
  .sb-k { font-size: 12px; color: var(--jce-ink-2); margin-top: 4px; }

  /* services list */
  .svc-list { display: flex; flex-direction: column; gap: 12px; }
  .svc-row { display: flex; align-items: center; gap: 18px; padding: 20px 22px; }
  .svc-ic { width: 52px; height: 52px; border-radius: 13px; background: var(--jce-green-50); display: grid; place-items: center; flex: none; }
  .svc-main { flex: 1; }
  .svc-name { font-size: 17px; font-weight: 700; }
  .svc-spec { font-size: 12px; color: var(--jce-orange-600); font-weight: 600; margin-left: 8px; }
  .svc-desc { font-size: 13.5px; color: var(--jce-ink-2); margin-top: 5px; line-height: 1.5; }

  /* filter chips */
  .filter-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .fchip { font-size: 13px; font-weight: 600; padding: 7px 14px; border-radius: var(--r-pill); border: 1px solid var(--jce-line); background: #fff; color: var(--jce-ink-2); cursor: pointer; }
  .fchip.on { background: var(--jce-green-700); color: #fff; border-color: var(--jce-green-700); }

  /* products */
  .prod-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
  .prod-card { overflow: hidden; padding: 0; }
  .prod-img { height: 130px; background: linear-gradient(135deg, var(--jce-green-50), #fff); }
  .prod-body { padding: 16px; }
  .prod-name { font-size: 15px; font-weight: 700; margin-top: 8px; line-height: 1.3; }
  .prod-spec { font-size: 12px; color: var(--jce-ink-2); margin: 4px 0 12px; }

  /* ---- S8 contact ---- */
  .contact-split { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
  .contact-info { padding: 24px; position: sticky; top: 90px; }
  .ci-block { margin-bottom: 18px; }
  .ci-k { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--jce-ink-2); }
  .ci-v { font-size: 14px; font-weight: 500; margin-top: 5px; line-height: 1.5; }
  .ci-map { height: 140px; border-radius: 12px; overflow: hidden; margin-top: 6px; background: linear-gradient(135deg, var(--jce-green-100), var(--jce-orange-100)); }
  .ci-map .pcard-ph span { font-size: 11px; }

  .inquiry-form { padding: 26px; }
  .if-section { font-size: 13px; font-weight: 700; margin: 24px 0 14px; padding-bottom: 8px; border-bottom: 1px solid var(--jce-line); display: flex; align-items: center; gap: 8px; }
  .if-section:first-child { margin-top: 0; }
  .if-opt { font-size: 10px; font-weight: 600; color: var(--jce-ink-2); background: #EEF1EF; padding: 2px 7px; border-radius: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .if-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .wfield { display: flex; flex-direction: column; }
  .wfield.full { grid-column: 1 / -1; }
  .wlbl { font-size: 12px; font-weight: 600; color: var(--jce-ink-2); margin-bottom: 6px; }
  .wreq { color: var(--st-danger); }
  .wfield .field { min-height: 44px; }
  .wfield textarea.field { min-height: 100px; resize: vertical; }
  .wfield.has-err .field { border-color: var(--st-danger); }
  .werr { font-size: 11px; color: var(--st-danger); margin-top: 5px; font-weight: 500; }
  .hp-field { position: absolute; left: -9999px; width: 1px; height: 1px; opacity: 0; }
  .if-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; gap: 16px; flex-wrap: wrap; }
  .captcha-stub { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--jce-ink-2); padding: 10px 14px; border: 1px solid var(--jce-line); border-radius: 10px; }
  .cap-box { width: 22px; height: 22px; border-radius: 5px; background: var(--jce-green-700); color: #fff; display: grid; place-items: center; font-size: 12px; }
  .cap-note { font-size: 10px; color: var(--jce-ink-2); }
  .if-foot .btn { padding: 12px 26px; font-size: 15px; }
  .form-err-note { font-size: 12px; color: var(--st-danger); margin-top: 12px; font-weight: 500; }

  .thanks-card { padding: 48px 32px; text-align: center; max-width: 560px; margin: 0 auto; }
  .thanks-ic { width: 72px; height: 72px; border-radius: 20px; background: var(--jce-green-50); display: grid; place-items: center; margin: 0 auto 20px; }
  .thanks-card h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
  .thanks-card p { font-size: 15px; color: var(--jce-ink-2); margin: 12px auto 20px; max-width: 46ch; line-height: 1.55; }
  .thanks-ref { display: inline-flex; flex-direction: column; gap: 4px; padding: 12px 20px; background: var(--jce-green-50); border-radius: 12px; margin-bottom: 24px; }
  .thanks-ref span:last-child { font-weight: 700; }

  /* ---- S6 news ---- */
  .news-list { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
  .news-card { overflow: hidden; padding: 0; }
  .news-img { height: 150px; background: linear-gradient(135deg, var(--jce-green-100), var(--jce-orange-100)); }
  .news-body { padding: 18px; }
  .news-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .news-date { font-size: 11px; color: var(--jce-ink-2); }
  .news-title { font-size: 16px; font-weight: 700; line-height: 1.3; }
  .news-excerpt { font-size: 13px; color: var(--jce-ink-2); margin: 8px 0 12px; line-height: 1.5; }

  /* ---- S7 careers ---- */
  .careers-list { display: flex; flex-direction: column; gap: 12px; }
  .career-row { display: flex; align-items: center; gap: 16px; padding: 20px 22px; }
  .career-main { flex: 1; }
  .career-title { font-size: 16px; font-weight: 700; }
  .career-meta { font-size: 13px; color: var(--jce-ink-2); margin-top: 4px; }

  /* ---- S9 FAQ ---- */
  .faq-list { display: flex; flex-direction: column; gap: 10px; max-width: 820px; margin: 0 auto; }
  .faq-item { overflow: hidden; }
  .faq-q { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 22px; border: none; background: transparent; cursor: pointer; text-align: left; font-size: 16px; font-weight: 600; color: var(--jce-ink); }
  .faq-caret { font-size: 22px; color: var(--jce-green-600); flex: none; font-weight: 400; }
  .faq-a { padding: 0 22px 20px; font-size: 14px; color: var(--jce-ink-2); line-height: 1.6; }

  /* footer */
  .site-footer { background: #11150f; color: rgba(255,255,255,0.7); padding: 44px 22px 28px; }
  .footer-inner { max-width: 1180px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1.4fr; gap: 32px; }
  .footer-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .footer-brand img { width: 32px; height: 32px; border-radius: 7px; }
  .footer-brand .fb-name { color: #fff; font-weight: 800; font-size: 15px; }
  .footer-about { font-size: 12.5px; line-height: 1.6; max-width: 38ch; }
  .footer-col h4 { color: #fff; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .footer-col a { display: block; font-size: 13px; color: rgba(255,255,255,0.65); padding: 4px 0; cursor: pointer; text-decoration: none; }
  .footer-col a:hover { color: #fff; }
  .footer-bottom { max-width: 1180px; margin: 28px auto 0; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; font-size: 11px; flex-wrap: wrap; gap: 8px; }

  /* ============ RESPONSIVE — driven by FRAME width (container queries) ============ */
  @container (max-width: 900px) {
    .site-links { display: none; }
    .site-nav .btn { display: none; }
    .nav-burger { display: flex; }
    .contact-split { grid-template-columns: 1fr; }
    .contact-info { position: static; }
    .cap-grid, .prod-grid, .news-list { grid-template-columns: repeat(2,1fr); }
    .footer-inner { grid-template-columns: 1fr 1fr; gap: 24px; }
  }
  @container (max-width: 560px) {
    .hero-h1 { font-size: 30px; }
    .hero-stats { grid-template-columns: repeat(2,1fr); gap: 20px 12px; }
    .cap-grid, .proj-rail, .proj-gallery, .prod-grid, .news-list, .about-grid, .if-grid { grid-template-columns: 1fr; }
    .stat-band, .hero-stats { grid-template-columns: repeat(2,1fr); }
    .sec-h2 { font-size: 24px; }
    .sec-head .sec-link { position: static; margin-top: 8px; }
    .trust-band { flex-direction: column; align-items: flex-start; padding: 24px; }
    .web-section { padding: 36px 18px; }
    .footer-inner { grid-template-columns: 1fr; }
    .ih-title { font-size: 28px; }
    .if-foot { flex-direction: column; align-items: stretch; }
    .if-foot .btn { width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

  /* ===================== PRINT ===================== */
  @media print {
    @page { size: A4 portrait; margin: 14mm 12mm; }
    html, body { background: #fff !important; }
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
    body, * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    /* strip preview chrome + device frame */
    .vp-toolbar { display: none !important; }
    .vp-stage { display: block !important; padding: 0 !important; min-height: 0 !important; }
    .vp-frame { width: 100% !important; max-width: 100% !important; min-height: 0 !important;
      border-radius: 0 !important; box-shadow: none !important; overflow: visible !important; background: #fff !important; }

    /* sticky nav must not repeat on every printed page */
    .site-nav { position: static !important; margin: 0 0 8px !important; box-shadow: none !important; }
    .mobile-menu { display: none !important; }

    /* freeze any entrance animations at end state */
    *, *::before, *::after {
      animation-delay: -99s !important; animation-duration: .001s !important;
      animation-iteration-count: 1 !important; animation-fill-mode: both !important;
      animation-play-state: running !important; transition-duration: 0s !important;
    }
    /* backdrop glow blobs are decorative — drop for clean print */
    .jce-backdrop::before, .jce-backdrop::after, .jce-glow-3 { display: none !important; }

    /* keep cards/sections from splitting awkwardly */
    .cap-card, .pcard, .prod-card, .news-card, .svc-row, .career-row,
    .faq-item, .about-card, .trust-band, .stat-band, .hero-stats,
    .contact-info, .inquiry-form, .thanks-card { break-inside: avoid; }
    .web-section, .web-hero, .inner-hero, .web-cta { break-inside: avoid-page; }
    .site-footer { break-before: page; }
    a { text-decoration: none !important; color: inherit; }
  }
</style>
</head>
<body>
<div class="vp-toolbar">
  <div class="vp-brand"><img src="assets/jce-logo.jpg" alt=""> JCE Website — responsive preview</div>
  <div class="vp-seg" id="vp-seg">
    <button data-vp="390">Mobile · 390</button>
    <button data-vp="768">Tablet · 768</button>
    <button data-vp="1280" class="on">Desktop · 1280</button>
  </div>
  <span class="vp-hint">mobile-first · ≥44px targets</span>
</div>

<div class="vp-stage" id="vp-stage" data-vp="1280">
  <div class="vp-frame"><div id="site" class="site-root"></div></div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;
const NAV = [["home","Home"],["about","About"],["services","Services"],["projects","Projects"],["products","Products"],["news","News"],["careers","Careers"],["faq","FAQ"]];

function Footer({ go }) {
  return (
    <footer className="site-footer">
      <div className="footer-inner">
        <div>
          <div className="footer-brand"><img src="assets/jce-logo.jpg" alt=""/><span className="fb-name">JC Electrofields</span></div>
          <p className="footer-about">Power infrastructure engineered to energize — substations, transmission lines and renewable energy up to 230 KV across the Philippines.</p>
        </div>
        <div className="footer-col"><h4>Company</h4><a onClick={()=>go("about")}>About</a><a onClick={()=>go("projects")}>Projects</a><a onClick={()=>go("news")}>News</a><a onClick={()=>go("careers")}>Careers</a></div>
        <div className="footer-col"><h4>Capabilities</h4><a onClick={()=>go("services")}>Services</a><a onClick={()=>go("products")}>Products</a><a onClick={()=>go("faq")}>FAQ</a><a onClick={()=>go("contact")}>Contact</a></div>
        <div className="footer-col"><h4>Get in touch</h4><a>2129 La Mesa St., Ugong,<br/>Valenzuela City</a><a>(02) 8000-0000</a><a>inquiries@jce.com.ph</a></div>
      </div>
      <div className="footer-bottom"><span>© 2026 JC Electrofields Power System, Inc. All rights reserved.</span><span>Privacy · Terms</span></div>
    </footer>
  );
}

function Site() {
  const [page, setPage] = useState("home");
  const [menu, setMenu] = useState(false);
  const go = (p) => { setPage(p); setMenu(false); const s=document.getElementById("site"); s&&s.scrollIntoView&&0; window.scrollTo&&window.scrollTo(0,0); };

  let content;
  if (page==="home") content = <S1Home go={go}/>;
  else if (page==="about") content = <S2About/>;
  else if (page==="services") content = <S3Services go={go}/>;
  else if (page==="projects") content = <S4Projects/>;
  else if (page==="products") content = <S5Products go={go}/>;
  else if (page==="news") content = <S6News/>;
  else if (page==="careers") content = <S7Careers go={go}/>;
  else if (page==="contact") content = <S8Contact/>;
  else if (page==="faq") content = <S9FAQ/>;

  return (
    <div className="jce-backdrop" style={{minHeight:"100%"}}>
      <nav className="site-nav glass-nav">
        <div className="site-logo" onClick={()=>go("home")}>
          <img src="assets/jce-logo.jpg" alt="JCE"/>
          <div><div className="sl-name">JC Electrofields</div><div className="sl-sub">Power System, Inc.</div></div>
        </div>
        <div className="site-links">{NAV.map(([id,l])=><a key={id} className={page===id?"on":""} onClick={()=>go(id)}>{l}</a>)}</div>
        <button className="btn btn-primary btn-sm" onClick={()=>go("contact")}>Contact</button>
        <button className="nav-burger" onClick={()=>setMenu(m=>!m)} aria-label="Menu"><span></span><span></span><span></span></button>
      </nav>
      {menu && <div className="mobile-menu glass">{NAV.map(([id,l])=><a key={id} onClick={()=>go(id)}>{l}</a>)}<button className="btn btn-primary" onClick={()=>go("contact")}>Contact us</button></div>}
      {content}
      <Footer go={go}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("site")).render(<Site/>);

// force full desktop layout for print (no device frame)
document.getElementById("vp-stage").setAttribute("data-vp", "1280");

// auto-print once fonts + first render settle
(function(){
  function go(){ setTimeout(function(){ window.print(); }, 600); }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function(){ requestAnimationFrame(go); });
  } else { window.addEventListener("load", go); }
})();

// viewport toggle
document.getElementById("vp-seg").addEventListener("click", (e) => {
  const b = e.target.closest("button"); if (!b) return;
  document.querySelectorAll("#vp-seg button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  document.getElementById("vp-stage").setAttribute("data-vp", b.dataset.vp);
});
</script>
